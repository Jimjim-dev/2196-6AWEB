<div class="container mt-4">
  <h2 class="mb-4">📚 Book Manager</h2>

  <!-- Form Card -->
  <div class="card p-4 mb-4 shadow">
    <div class="mb-2">
      <input [(ngModel)]="newBook.title" placeholder="Title" class="form-control">
    </div>
    <div class="mb-2">
      <input [(ngModel)]="newBook.author" placeholder="Author" class="form-control">
    </div>
    <div class="mb-2">
      <input [(ngModel)]="newBook.genre" placeholder="Genre" class="form-control">
    </div>
    <div class="mb-3">
      <input [(ngModel)]="newBook.year" placeholder="Year" class="form-control" type="number">
    </div>

    <button *ngIf="!editMode" (click)="addBook()" class="btn btn-primary w-100">
      ➕ Add Book
    </button>
    <button *ngIf="editMode" (click)="updateBook()" class="btn btn-warning w-100">
      ✏️ Update Book
    </button>
  </div>

  <!-- Table -->
  <table class="table table-striped table-bordered shadow">
    <thead class="table-dark">
      <tr>
        <th>Title</th>
        <th>Author</th>
        <th>Genre</th>
        <th>Year</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let book of books">
        <td>{{book.title}}</td>
        <td>{{book.author}}</td>
        <td>{{book.genre}}</td>
        <td>{{book.year}}</td>
        <td>
          <button (click)="editBook(book)" class="btn btn-sm btn-warning me-2">✏️ Edit</button>
          <button (click)="deleteBook(book._id)" class="btn btn-sm btn-danger">🗑️ Delete</button>
        </td>
      </tr>
    </tbody>
  </table>
</div
